[build]
  command = "npm ci && rm -rf dist node_modules/.vite && npm run build"
  publish = "dist"

[build.environment]
  # Disable secrets scanning for expected environment variables
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY"
  # Omit scripts directory from scanning
  SECRETS_SCAN_OMIT_PATHS = "scripts/**,dist/**"
  # NODE_ENV is intentionally NOT set to "production" here. Netlify's build
  # wrapper treats that as `--omit=optional`, which strips sharp's native
  # binary (@img/sharp-linux-x64) and breaks the prebuild thumbnail step.
  # `vite build` already runs in production mode regardless.

# SPA fallback — serves index.html for routes without prerendered files
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
